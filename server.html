<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Oliom Horizons — Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <a href="index.html" class="brand-mini">
      <img src="https://res.cloudinary.com/duqlfltkd/image/upload/f_auto,q_auto/Logo_3_1_3_1_hrynwk" alt="Oliom Horizons logo" class="brand-logo" />
      <div class="brand-title">Oliom Horizons<span>Firebase</span></div>
    </a>
    <nav class="main-nav">
      <a href="index.html" class="btn">Home</a>
      <a href="studio.html" class="btn">Studio</a>
      <a href="server.html" class="btn">Games</a>
      <a href="rules.html" class="btn">Rules</a>
    </nav>
    <div class="auth-buttons" data-auth></div>
  </header>

  <main>
    <section class="block">
      <h1 style="margin-top:0;">Games</h1>
      <p>Published OHS worlds from Oliom Horizons Studio. Press Play to open the world in the OHS engine.</p>
      <div class="server-actions-bar">
        <a class="btn primary" href="studio.html">Create in Studio</a>
        <button id="refreshWorldsBtn" class="btn">Refresh</button>
        <span id="serverStatusLine" class="status-line">Loading games...</span>
      </div>
      <div id="worldList" class="server-list">
        <div class="server-empty">Loading games...</div>
      </div>
    </section>
  </main>

  <footer>© 2026 Oliom Horizons — Firebase · <a href="rules.html" style="color:white;text-decoration:underline;">Rules</a></footer>

  <script type="module">
    import {
      db, renderHeaderAuth, escapeHtml, checkDeviceBanOrBlock, collection, getDocs, query, orderBy
    } from './firebase-core.js';

    await renderHeaderAuth();
    await checkDeviceBanOrBlock();

    const worldList = document.getElementById('worldList');
    const statusLine = document.getElementById('serverStatusLine');

    async function renderWorlds() {
      const q = query(collection(db, 'worlds'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      const worlds = [];
      snap.forEach(d => worlds.push({ id:d.id, ...d.data() }));

      statusLine.textContent = `${worlds.length} published game${worlds.length === 1 ? '' : 's'}`;

      if (!worlds.length) {
        worldList.innerHTML = '<div class="server-empty">No published games yet. Create one in Studio and press Publish.</div>';
        return;
      }

      worldList.innerHTML = worlds.map(w => `
        <div class="server-card">
          <div class="server-top">
            <div>
              <div class="server-name">${escapeHtml(w.title || 'Untitled OHS World')}</div>
              <div class="server-meta">by ${escapeHtml(w.ownerName || 'Unknown')} · ${escapeHtml(w.engine || 'OHS')}</div>
            </div>
            <a class="btn primary" href="studio.html?world=${w.id}&play=1">Play</a>
          </div>
          <div class="server-description">${escapeHtml(w.description || 'No description.')}</div>
          <div class="server-badges">
            <span class="badge">${w.playerCount || 0} / ${w.maxPlayers || 8} players</span>
            <span class="badge">${escapeHtml(w.status || 'published')}</span>
            <span class="badge">OHS world</span>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('refreshWorldsBtn').addEventListener('click', renderWorlds);
    await renderWorlds();
  </script>
</body>
</html>
