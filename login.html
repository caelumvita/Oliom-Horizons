
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Oliom Horizons — Log in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <a href="server.html" class="brand-mini">
      <img src="https://res.cloudinary.com/duqlfltkd/image/upload/f_auto,q_auto/Logo_3_1_3_1_hrynwk" alt="Oliom Horizons logo" class="brand-logo" />
      <div class="brand-title">Oliom Horizons<span>Firebase</span></div>
    </a>
    <nav class="main-nav">
      <a href="server.html" class="btn primary">Games</a>
      <a href="studio.html" class="btn">Studio</a>
      <a href="profile.html" class="btn">Profile</a>
      <a href="moderation.html" class="btn">Moderation</a>
      <a href="rules.html" class="btn">Rules</a>
    </nav>
    <div class="auth-buttons" data-auth></div>
  </header>
  <main>
    <section class="block" style="max-width:560px;">
      <h1 style="margin-top:0;">Log in</h1>
      <p>Use your Oliom Horizons Firebase account.</p>
      <div class="server-form">
        <label>Email<input id="email" type="email" maxlength="80" placeholder="you@example.com" /></label>
        <label>Password<input id="password" type="password" maxlength="80" placeholder="Password" /></label>
        <div class="row-actions">
          <button id="loginSubmit" class="btn primary">Log in</button>
          <a href="signin.html" class="btn">Create account</a>
        </div>
        <span id="msg" class="tiny"></span>
      </div>
    </section>
  </main>
  <footer>© 2026 Oliom Horizons — Firebase</footer>
  <script type="module">
import { $, renderHeaderAuth, signInWithEmailAndPassword, auth, checkDeviceBanOrBlock } from "./firebase-core.js";
await renderHeaderAuth();
await checkDeviceBanOrBlock();
async function doLogin() {
  const email = $("email").value.trim();
  const password = $("password").value;
  $("msg").textContent = "";
  if (!email || !password) { $("msg").textContent = "Type email and password."; return; }
  try { await signInWithEmailAndPassword(auth, email, password); location.href = "server.html"; }
  catch (err) { console.error(err); $("msg").textContent = "Login failed: " + err.message; }
}
$("loginSubmit").addEventListener("click", doLogin);
$("password").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
