<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Oliom Horizons — Sign up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <a href="index.html" class="brand-mini">
      <img src="https://res.cloudinary.com/duqlfltkd/image/upload/f_auto,q_auto/Logo_3_1_3_1_hrynwk" alt="Oliom Horizons logo" class="brand-logo" />
      <div class="brand-title">Oliom Horizons<span>Firebase</span></div>
    </a>
    <nav class="main-nav">
      <a href="index.html" class="btn">Home</a>
      <a href="studio.html" class="btn">Studio</a>
      <a href="server.html" class="btn">Games</a>
      <a href="rules.html" class="btn">Rules</a>
    </nav>
    <div class="auth-buttons" data-auth></div>
  </header>

  <main>

    <section class="block" style="max-width:560px;">
      <h1 style="margin-top:0;">Create account</h1>
      <p>Green is the default avatar color. You can change it later on the home page.</p>
      <div class="server-form">
        <label>Username<input id="username" type="text" maxlength="24" placeholder="Username" /></label>
        <label>Email<input id="email" type="email" maxlength="80" placeholder="you@example.com" /></label>
        <label>Password<input id="password" type="password" maxlength="80" placeholder="At least 6 characters" /></label>
        <div class="row-actions">
          <button id="signupSubmit" class="btn primary">Create account</button>
          <a href="login.html" class="btn">I already have one</a>
        </div>
        <span id="msg" class="tiny"></span>
      </div>
    </section>

  </main>
  <footer>© 2026 Oliom Horizons — Firebase · <a href="rules.html" style="color:white;text-decoration:underline;">Rules</a></footer>
  <script type="module">

import { $, auth, renderHeaderAuth, createUserWithEmailAndPassword, updateProfile, createProfileForUser } from "./firebase-core.js";
await renderHeaderAuth();
async function doSignup() {
  const username = $("username").value.trim().slice(0, 24);
  const email = $("email").value.trim();
  const password = $("password").value;
  $("msg").textContent = "";
  if (!username || !email || !password) { $("msg").textContent = "Type username, email and password."; return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: username });
    await createProfileForUser(cred.user, username);
    location.href = "index.html";
  } catch (err) {
    console.error(err);
    if (err.code === "auth/email-already-in-use") $("msg").textContent = "This email is already used.";
    else if (err.code === "auth/weak-password") $("msg").textContent = "Password is too weak. Use at least 6 characters.";
    else $("msg").textContent = "Sign up failed. Check your email and password.";
  }
}
$("signupSubmit").addEventListener("click", doSignup);
$("password").addEventListener("keydown", e => { if (e.key === "Enter") doSignup(); });

  </script>
</body>
</html>
