
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Oliom Horizons — Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="theme.js"></script>
  <style>
    :root {
      --lime:#7ed957;
      --green:#1f5d19;
      --green-2:#3f922e;
      --muted:#667868;
      --line:#d6efcf;
      --text:#172819;
      --panel:rgba(255,255,255,.88);
      --bg:#ffffff;
    }
    html[data-theme="dark"] {
      --lime:#65c944;
      --green:#93df77;
      --green-2:#82db65;
      --muted:#b7c9b2;
      --line:#2f4b31;
      --text:#eef7eb;
      --panel:rgba(14,24,15,.88);
      --bg:#0f170f;
    }
    * { box-sizing:border-box; }
    html, body {
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    #gameFrame {
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      display:none;
      background:var(--bg);
    }
    #loading {
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      background:var(--bg);
      z-index:20;
    }
    .loading-card {
      max-width:720px;
      margin:20px;
      padding:18px;
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--panel);
      backdrop-filter:blur(8px);
      color:var(--text);
    }
    .loading-card h1 {
      margin-top:0;
      color:var(--green-2);
    }
    #topHud {
      position:fixed;
      top:10px;
      left:10px;
      right:10px;
      z-index:8;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
      pointer-events:none;
    }
    .hud-card {
      pointer-events:auto;
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel);
      backdrop-filter:blur(8px);
      color:var(--text);
      font-size:13px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
    }
    .btn {
      display:inline-flex;
      justify-content:center;
      align-items:center;
      min-height:32px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--green-2);
      text-decoration:none;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
    }
    html[data-theme="dark"] .btn {
      background:#0f1a10;
      color:var(--text);
    }
    #chatPanel {
      position:fixed;
      left:12px;
      bottom:12px;
      width:min(430px,calc(100vw - 24px));
      z-index:9;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:10px;
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel);
      backdrop-filter:blur(8px);
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      color:var(--text);
    }
    #chatPanel.collapsed #chatMessages,
    #chatPanel.collapsed #chatForm,
    #chatPanel.collapsed #chatStatus {
      display:none;
    }
    #chatHeader {
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:13px;
      font-weight:900;
      color:var(--green);
    }
    #chatMessages {
      height:145px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:5px;
      padding-right:3px;
    }
    .chatMsg {
      font-size:13px;
      line-height:1.35;
      color:var(--text);
      word-break:break-word;
    }
    .chatName {
      font-weight:900;
      color:var(--green-2);
    }
    #chatForm {
      display:flex;
      gap:6px;
    }
    #chatInput {
      flex:1;
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 11px;
      background:#fff;
      color:#172819;
      outline:none;
    }
    html[data-theme="dark"] #chatInput {
      background:#0f1a10;
      color:var(--text);
    }
    #chatSend,
    #chatToggle {
      border:0;
      border-radius:999px;
      padding:7px 12px;
      background:var(--lime);
      color:#102011;
      font-weight:900;
      cursor:pointer;
    }
    #chatStatus {
      font-size:11px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <iframe id="gameFrame" title="Oliom Horizons Runtime" allow="pointer-lock; fullscreen"></iframe>

  <div id="topHud">
    <div class="hud-card"><strong id="worldTitle">Loading...</strong><span id="onlineCount">online</span></div>
    <div class="hud-card">
      <a class="btn" href="server.html">Games</a>
      <a class="btn" href="settings.html">Settings</a>
      <button id="reloadBtn" class="btn">Reload</button>
    </div>
  </div>

  <section id="chatPanel">
    <div id="chatHeader"><span>Game Chat</span><button id="chatToggle" type="button">Hide</button></div>
    <div id="chatMessages"><div class="chatMsg"><span class="chatName">System:</span> Loading chat...</div></div>
    <form id="chatForm">
      <input id="chatInput" maxlength="160" autocomplete="off" placeholder="Press Enter to chat..." />
      <button id="chatSend" type="submit">Send</button>
    </form>
    <div id="chatStatus">Temporary per-game chat.</div>
  </section>

  <div id="loading">
    <div class="loading-card">
      <h1>Loading game...</h1>
      <p id="loadingText">Opening player runtime.</p>
    </div>
  </div>

  <script type="module">
    import {
      authReady, ensureProfile, db, escapeHtml,
      doc, getDoc, deleteDoc, collection, addDoc, getDocs, query, orderBy, limit, onSnapshot, serverTimestamp
    } from "./firebase-core.js";

    const params = new URLSearchParams(location.search);
    const worldId = params.get("world");
    const frame = document.getElementById("gameFrame");
    const loading = document.getElementById("loading");
    const loadingText = document.getElementById("loadingText");
    const worldTitle = document.getElementById("worldTitle");
    const onlineCount = document.getElementById("onlineCount");
    const reloadBtn = document.getElementById("reloadBtn");

    const chatPanel = document.getElementById("chatPanel");
    const chatMessages = document.getElementById("chatMessages");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const chatStatus = document.getElementById("chatStatus");
    const chatToggle = document.getElementById("chatToggle");

    let user = null;
    let profile = null;

    function loadFrame() {
      if(!worldId) {
        loadingText.textContent = "No world id. Open a game from Games.";
        return;
      }
      frame.style.display = "none";
      loading.style.display = "grid";
      frame.src = "studio.html?world=" + encodeURIComponent(worldId) + "&play=1&fromGame=1&runtime=1&v=18";
      frame.onload = () => {
        loading.style.display = "none";
        frame.style.display = "block";
        try {
          frame.contentWindow?.focus?.();
        } catch(e) {}
      };
      setTimeout(() => {
        if(frame.style.display !== "block") loadingText.textContent = "Still loading. If it stays here, check F12 Console.";
      }, 4500);
    }

    async function loadWorldTitle() {
      if(!worldId) return;
      try {
        const snap = await getDoc(doc(db,"worlds",worldId));
        if(snap.exists()) worldTitle.textContent = snap.data().title || "OHS World";
      } catch(e) {
        console.warn("Could not load title", e);
      }
    }

    function watchOnline() {
      if(!worldId)return;
      onSnapshot(collection(db,"worlds",worldId,"players"), snap => {
        onlineCount.textContent = snap.size + " online";
      }, () => {});
    }

    async function cleanupOldChat() {
      try {
        const snap = await getDocs(query(collection(db,"worlds",worldId,"liveChat"), orderBy("createdAt","asc"), limit(120)));
        const cutoff = Date.now() - 20 * 60 * 1000;
        snap.forEach(d => {
          const t = d.data().createdAt?.toMillis?.() || Date.now();
          if(t < cutoff) deleteDoc(doc(db,"worlds",worldId,"liveChat",d.id)).catch(()=>{});
        });
      } catch(e) {
        console.warn("chat cleanup failed", e);
      }
    }

    async function initChat() {
      if(!worldId) {
        chatStatus.textContent = "Open a game from Games to chat.";
        chatInput.disabled = true;
        return;
      }
      user = await authReady();
      profile = user ? await ensureProfile(user) : null;
      chatStatus.textContent = user ? `Chatting as ${profile.username || "Player"}` : "Log in to send messages.";
      chatInput.disabled = !user;

      cleanupOldChat();

      const q = query(collection(db,"worlds",worldId,"liveChat"), orderBy("createdAt","asc"), limit(40));
      onSnapshot(q, snap => {
        const rows = [];
        snap.forEach(d => rows.push({ id:d.id, ...d.data() }));
        chatMessages.innerHTML = rows.length
          ? rows.map(m => `<div class="chatMsg"><span class="chatName">${escapeHtml(m.authorName || "Player")}:</span> ${escapeHtml(m.text || "")}</div>`).join("")
          : '<div class="chatMsg"><span class="chatName">System:</span> No messages yet.</div>';
        chatMessages.scrollTop = chatMessages.scrollHeight + 1000;
      }, err => {
        chatMessages.innerHTML = `<div class="chatMsg"><span class="chatName">System:</span> Chat error: ${escapeHtml(err.message)}</div>`;
      });
    }

    chatForm.addEventListener("submit", async e => {
      e.preventDefault();
      if(!user || !profile || !worldId) return;
      const text = chatInput.value.trim().slice(0,160);
      if(!text) return;
      chatInput.value = "";
      await addDoc(collection(db,"worlds",worldId,"liveChat"), {
        authorId:user.uid,
        authorName:profile.username || "Player",
        text,
        createdAt:serverTimestamp()
      });
      cleanupOldChat();
    });

    chatInput.addEventListener("focus", () => {
      try { frame.contentDocument?.exitPointerLock?.(); } catch(e) {}
    });

    chatInput.addEventListener("keydown", e => {
      if(e.code === "Escape") {
        chatInput.blur();
        frame.contentWindow?.focus?.();
      }
    });

    chatToggle.addEventListener("click", () => {
      chatPanel.classList.toggle("collapsed");
      chatToggle.textContent = chatPanel.classList.contains("collapsed") ? "Show" : "Hide";
    });

    reloadBtn.addEventListener("click", () => {
      frame.src = "about:blank";
      setTimeout(loadFrame, 100);
    });

    await loadWorldTitle();
    watchOnline();
    await initChat();
    loadFrame();
  </script>
</body>
</html>
