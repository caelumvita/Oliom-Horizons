
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Oliom Horizons — Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="theme.js"></script>
  <style>
    :root{--lime:#7ed957;--green:#1f5d19;--green-2:#3f922e;--muted:#667868;--line:#d6efcf;--text:#172819;--panel:rgba(255,255,255,.86);}
    html[data-theme="dark"]{--lime:#65c944;--green:#93df77;--green-2:#82db65;--muted:#b7c9b2;--line:#2f4b31;--text:#eef7eb;--panel:rgba(14,24,15,.86);}
    *{box-sizing:border-box}
    body{margin:0;height:100vh;overflow:hidden;background:#0e160f;color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #game{position:fixed;inset:0}
    canvas{display:block;cursor:none}
    #topHud{position:fixed;left:12px;top:12px;right:12px;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:8px;pointer-events:none}
    .hud-card{pointer-events:auto;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:14px;border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(8px);font-size:13px;color:var(--text)}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:32px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.9);color:var(--green-2);font-weight:800;text-decoration:none;cursor:pointer}
    html[data-theme="dark"] .btn{background:#0f1a10;color:var(--text)}
    #status{position:fixed;inset:0;display:grid;place-items:center;background:#fff;color:var(--muted);z-index:20}
    html[data-theme="dark"] #status{background:#0f170f}
    #status .card{max-width:720px;margin:20px;padding:18px;border:1px solid var(--line);border-radius:18px;background:var(--panel)}
    #dialogueBox{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:7;width:min(680px,calc(100vw - 24px));padding:14px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.94);color:#111;display:none;box-shadow:0 8px 28px rgba(0,0,0,.12)}
    #dialogueBox *{color:#111!important}
    #dialogueName{font-weight:900;margin-bottom:6px;color:#1f5d19!important}
    #dialogueText{line-height:1.45}
    #dialogueResponses{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    #dialogueResponses button{border:1px solid #d6efcf;background:#fff;border-radius:999px;padding:6px 10px;cursor:pointer;font-weight:800}
    #chatPanel{position:fixed;left:12px;bottom:12px;width:min(430px,calc(100vw - 24px));z-index:8;display:flex;flex-direction:column;gap:8px;padding:10px;border:1px solid var(--line);border-radius:16px;background:var(--panel);backdrop-filter:blur(8px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
    #chatPanel.collapsed #chatMessages,#chatPanel.collapsed #chatForm,#chatPanel.collapsed #chatStatus{display:none}
    #chatHeader{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:900;color:var(--green)}
    #chatMessages{height:145px;overflow:auto;display:flex;flex-direction:column;gap:5px;padding-right:3px}
    .chatMsg{font-size:13px;line-height:1.35;color:var(--text);word-break:break-word}
    .chatName{font-weight:900;color:var(--green-2)}
    #chatForm{display:flex;gap:6px}
    #chatInput{flex:1;border:1px solid var(--line);border-radius:999px;padding:8px 11px;background:#fff;color:#172819;outline:none}
    html[data-theme="dark"] #chatInput{background:#0f1a10;color:var(--text)}
    #chatSend,#chatToggle{border:0;border-radius:999px;padding:7px 12px;background:var(--lime);color:#102011;font-weight:900;cursor:pointer}
    #chatStatus{font-size:11px;color:var(--muted)}
    #crosshair{position:fixed;left:50%;top:50%;width:8px;height:8px;border-radius:50%;border:2px solid rgba(255,255,255,.8);transform:translate(-50%,-50%);z-index:4;pointer-events:none}
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="crosshair"></div>

  <div id="topHud">
    <div class="hud-card"><strong id="worldTitle">Loading...</strong><span id="onlineCount" class="tiny">0 online</span></div>
    <div class="hud-card"><a class="btn" href="server.html">Games</a><a class="btn" href="settings.html">Settings</a><button id="reloadBtn" class="btn">Reload</button></div>
  </div>

  <div id="dialogueBox">
    <div id="dialogueName">NPC</div>
    <div id="dialogueText"></div>
    <div id="dialogueResponses"></div>
  </div>

  <section id="chatPanel">
    <div id="chatHeader"><span>Game Chat</span><button id="chatToggle" type="button">Hide</button></div>
    <div id="chatMessages"><div class="chatMsg"><span class="chatName">System:</span> Loading chat...</div></div>
    <form id="chatForm">
      <input id="chatInput" maxlength="160" autocomplete="off" placeholder="Press Enter to chat..." />
      <button id="chatSend" type="submit">Send</button>
    </form>
    <div id="chatStatus">Temporary per-game chat.</div>
  </section>

  <div id="status"><div class="card"><h1>Loading game...</h1><p id="statusText">Preparing runtime.</p></div></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";
    import {
      authReady, ensureProfile, db, escapeHtml,
      doc, getDoc, setDoc, deleteDoc, collection, addDoc, getDocs, query, orderBy, limit, onSnapshot, serverTimestamp
    } from "./firebase-core.js";

    const params = new URLSearchParams(location.search);
    const worldId = params.get("world");
    const root = document.getElementById("game");
    const status = document.getElementById("status");
    const statusText = document.getElementById("statusText");
    const worldTitle = document.getElementById("worldTitle");
    const onlineCount = document.getElementById("onlineCount");

    let user = null, profile = null, world = null, worldData = null;
    let objects = [], colliders = [], npcs = [], otherPlayers = new Map();
    let unsubPlayers = null, unsubChat = null, lastPresence = 0;
    let keys = new Set(), pointerLocked = false;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xa79bb4);
    scene.fog = new THREE.Fog(0xa79bb4, 80, 320);

    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, .1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    root.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xffffff,0x31552b,1.25); scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff,2.2);
    sun.position.set(-40,70,40); sun.castShadow=true; sun.shadow.mapSize.set(2048,2048); scene.add(sun);

    const player = {pos:new THREE.Vector3(0,5,0), vel:new THREE.Vector3(), yaw:Math.PI, pitch:-.25, grounded:false, radius:1, height:2};
    const playerGroup = makePlayerGroup("green", "You", true);
    scene.add(playerGroup);

    function avatarColorToHex(color){
      return {green:0x7ed957,blue:0x59a8ff,red:0xff6b6b,orange:0xffb347}[color||"green"]||0x7ed957;
    }

    function makeFaceTexture(){
      const c=document.createElement("canvas"); c.width=1024; c.height=1024;
      const ctx=c.getContext("2d"); ctx.clearRect(0,0,c.width,c.height);
      ctx.strokeStyle="rgba(23,38,27,.98)"; ctx.lineWidth=48; ctx.lineCap="round"; ctx.lineJoin="round";
      function eye(cx,cy,flip){ctx.beginPath();ctx.moveTo(cx-135,cy+65);ctx.lineTo(cx-10*flip,cy-95);ctx.lineTo(cx+135,cy+60);ctx.stroke();}
      eye(330,330,1); eye(695,330,-1);
      ctx.beginPath();ctx.moveTo(275,645);ctx.bezierCurveTo(380,805,610,820,760,665);ctx.stroke();
      const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace; return tex;
    }

    function makeNameTexture(name){
      const c=document.createElement("canvas"); c.width=768; c.height=192;
      const ctx=c.getContext("2d"); ctx.clearRect(0,0,c.width,c.height);
      ctx.fillStyle="rgba(255,255,255,.92)"; roundedRect(ctx,34,36,700,108,46); ctx.fill();
      ctx.strokeStyle="rgba(214,239,207,.95)"; ctx.lineWidth=6; roundedRect(ctx,34,36,700,108,46); ctx.stroke();
      ctx.fillStyle="rgba(31,93,25,.98)"; ctx.font="bold 58px system-ui,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText((name||"Player").slice(0,20),384,91);
      const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace; return tex;
    }
    function roundedRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

    function makePlayerGroup(colorName, name, local=false){
      const color=avatarColorToHex(colorName);
      const g=new THREE.Group();
      const body=new THREE.Mesh(new THREE.SphereGeometry(1,40,32),new THREE.MeshPhysicalMaterial({color,transparent:true,opacity:local?.76:.74,roughness:.16,metalness:.03,clearcoat:1,transmission:.03}));
      body.castShadow=body.receiveShadow=true; g.add(body);
      const glow=new THREE.Mesh(new THREE.SphereGeometry(.42,20,16),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.36})); glow.position.set(0,.08,.08); g.add(glow);
      const face=new THREE.Mesh(new THREE.PlaneGeometry(1.18,1.18),new THREE.MeshBasicMaterial({map:makeFaceTexture(),transparent:true,depthWrite:false,depthTest:true,alphaTest:.02,side:THREE.DoubleSide,polygonOffset:true,polygonOffsetFactor:-5,polygonOffsetUnits:-5}));
      face.position.set(0,.1,1.04); face.renderOrder=60; g.add(face);
      if(!local){
        const tag=new THREE.Sprite(new THREE.SpriteMaterial({map:makeNameTexture(name),transparent:true,depthWrite:false,depthTest:false,opacity:.96}));
        tag.scale.set(4.8,1.2,1); tag.position.set(0,2.55,0); tag.renderOrder=70; g.add(tag); g.userData.tag=tag;
      }
      g.userData={body,glow,face,colorName};
      return g;
    }

    function setGroupColor(g,colorName){
      const hex=avatarColorToHex(colorName);
      if(g.userData.body?.material?.color)g.userData.body.material.color.setHex(hex);
      if(g.userData.glow?.material?.color)g.userData.glow.material.color.setHex(hex);
      g.userData.colorName=colorName||"green";
    }

    function mat(type,color,opacity=1){
      const c=color||{cube:"#85e0ff",sphere:"#96ffbf",cylinder:"#9bb8ff",cone:"#ffd166",triangle:"#ff8fa3",npc:"#8fdcff",checkpoint:"#7dff96",spawnpoint:"#72a7ff",baseplate:"#7fba60"}[type]||"#ffffff";
      return new THREE.MeshStandardMaterial({color:new THREE.Color(c),roughness:.55,metalness:.05,transparent:opacity<.999,opacity,depthWrite:opacity>.72});
    }
    function triGeo(){const s=new THREE.Shape();s.moveTo(0,1.15);s.lineTo(-1.15,-1.05);s.lineTo(1.15,-1.05);s.lineTo(0,1.15);return new THREE.ExtrudeGeometry(s,{depth:.45,bevelEnabled:false}).center();}
    function geo(type){
      if(type==="baseplate")return new THREE.BoxGeometry(360,2,360);
      if(type==="checkpoint")return new THREE.CylinderGeometry(1.45,1.45,.32,36);
      if(type==="spawnpoint")return new THREE.CylinderGeometry(1.1,1.1,.25,36);
      if(type==="cube")return new THREE.BoxGeometry(2,2,2);
      if(type==="sphere"||type==="npc")return new THREE.SphereGeometry(1,36,24);
      if(type==="cylinder")return new THREE.CylinderGeometry(1,1,2,36);
      if(type==="cone")return new THREE.ConeGeometry(1.1,2.2,32);
      if(type==="triangle")return triGeo();
      return new THREE.BoxGeometry(2,2,2);
    }

    function addObject(data){
      const o=new THREE.Mesh(geo(data.type),mat(data.type,data.color,data.opacity??1));
      o.position.fromArray(data.pos||[0,0,0]); o.rotation.set(data.rot?.[0]||0,data.rot?.[1]||0,data.rot?.[2]||0); o.scale.fromArray(data.scale||[1,1,1]);
      o.castShadow=o.receiveShadow=true;
      o.userData=data;
      scene.add(o); objects.push(o);
      if(data.canCollide!==false && data.type!=="npc" && data.type!=="checkpoint" && data.type!=="spawnpoint"){o.updateMatrixWorld(true);colliders.push({obj:o,box:new THREE.Box3().setFromObject(o)});}
      if(data.type==="npc"){
        const face=new THREE.Mesh(new THREE.PlaneGeometry(1.05,1.05),new THREE.MeshBasicMaterial({map:makeFaceTexture(),transparent:true,depthWrite:false,alphaTest:.03,side:THREE.DoubleSide,polygonOffset:true,polygonOffsetFactor:-3,polygonOffsetUnits:-3}));
        face.position.set(0,.05,.96); face.renderOrder=20; o.add(face); npcs.push(o);
      }
      return o;
    }

    function findSpawn(){
      const s=(worldData.objects||[]).find(o=>o.type==="spawnpoint");
      return s ? new THREE.Vector3(...s.pos).add(new THREE.Vector3(0,3,0)) : new THREE.Vector3(0,5,0);
    }

    async function loadWorld(){
      if(!worldId)throw new Error("No world id. Open a game from Games.");
      const snap=await getDoc(doc(db,"worlds",worldId));
      if(!snap.exists())throw new Error("World not found.");
      world={id:snap.id,...snap.data()};
      worldData=world.worldData||{objects:[]};
      worldTitle.textContent=world.title||"OHS World";
      (worldData.objects||[]).forEach(addObject);
      if(!(worldData.objects||[]).some(o=>o.type==="baseplate"))addObject({type:"baseplate",name:"Baseplate",pos:[0,-1,0],rot:[0,0,0],scale:[1,1,1],color:"#7fba60",canCollide:true});
      player.pos.copy(findSpawn());
      playerGroup.position.copy(player.pos);
      setGroupColor(playerGroup, profile?.avatarColor||"green");
      status.style.display="none";
    }

    function setupControls(){
      addEventListener("keydown",e=>{ if(document.activeElement===chatInput)return; keys.add(e.code); if(e.code==="Enter"){chatInput.focus();document.exitPointerLock?.();} });
      addEventListener("keyup",e=>keys.delete(e.code));
      renderer.domElement.addEventListener("click",()=>renderer.domElement.requestPointerLock?.());
      document.addEventListener("pointerlockchange",()=>pointerLocked=document.pointerLockElement===renderer.domElement);
      document.addEventListener("mousemove",e=>{if(!pointerLocked)return;player.yaw-=e.movementX*.003;player.pitch=Math.max(-1.15,Math.min(.55,player.pitch-e.movementY*.0024));});
      addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
      document.getElementById("reloadBtn").onclick=()=>location.reload();
    }

    function horizontalCollide(newPos){
      const r=player.radius*.72;
      for(const c of colliders){
        const b=c.box;
        if(newPos.y < b.max.y+1.4 && newPos.y > b.min.y-.4 && newPos.x+r>b.min.x && newPos.x-r<b.max.x && newPos.z+r>b.min.z && newPos.z-r<b.max.z)return true;
      }
      return false;
    }
    function groundYAt(pos){
      let y=-Infinity; const r=player.radius*.55;
      for(const c of colliders){
        const b=c.box;
        if(pos.x+r>b.min.x && pos.x-r<b.max.x && pos.z+r>b.min.z && pos.z-r<b.max.z && pos.y>=b.max.y-.6)y=Math.max(y,b.max.y+player.radius);
      }
      return y;
    }

    function updatePlayer(dt){
      const forward=new THREE.Vector3(Math.sin(player.yaw),0,Math.cos(player.yaw));
      const right=new THREE.Vector3(Math.cos(player.yaw),0,-Math.sin(player.yaw));
      let move=new THREE.Vector3();
      if(keys.has("KeyW"))move.add(forward); if(keys.has("KeyS"))move.sub(forward); if(keys.has("KeyD"))move.add(right); if(keys.has("KeyA"))move.sub(right);
      if(move.lengthSq()>0)move.normalize();
      const speed=(keys.has("ShiftLeft")||keys.has("ShiftRight"))?11:7;
      const proposed=player.pos.clone().add(move.multiplyScalar(speed*dt));
      if(!horizontalCollide(proposed))player.pos.copy(proposed);
      const gy=groundYAt(player.pos);
      if(player.pos.y<=gy+.05){player.pos.y=gy;player.vel.y=0;player.grounded=true;}else{player.grounded=false;player.vel.y-=24*dt;}
      if(keys.has("Space")&&player.grounded){player.vel.y=10.5;player.grounded=false;}
      player.pos.y+=player.vel.y*dt;
      const gy2=groundYAt(player.pos);
      if(player.pos.y<=gy2){player.pos.y=gy2;player.vel.y=0;player.grounded=true;}
      playerGroup.position.copy(player.pos); playerGroup.rotation.y=player.yaw;
      const camDir=new THREE.Vector3(Math.sin(player.yaw)*Math.cos(player.pitch),Math.sin(player.pitch),Math.cos(player.yaw)*Math.cos(player.pitch));
      const camPos=player.pos.clone().add(new THREE.Vector3(0,1.1,0)).sub(camDir.multiplyScalar(10));
      camera.position.lerp(camPos,.22); camera.lookAt(player.pos.x,player.pos.y+.8,player.pos.z);
      updateNpcDialogue();
    }

    function updateNpcDialogue(){
      let near=null, dist=3.5;
      for(const n of npcs){
        const d=n.position.distanceTo(player.pos);
        if(d<dist){dist=d;near=n;}
      }
      if(near && (near.userData.dialogue||near.userData.responses?.length)){
        dialogueBox.style.display="block"; dialogueName.textContent=near.userData.name||"NPC"; dialogueText.textContent=near.userData.dialogue||"Hello!";
        dialogueResponses.innerHTML=(near.userData.responses||[]).slice(0,4).map(r=>`<button type="button">${escapeHtml(r.text||r||"OK")}</button>`).join("") || '<button type="button">OK</button>';
      }else dialogueBox.style.display="none";
    }

    async function startPresence(){
      if(!user)return;
      const ref=doc(db,"worlds",worldId,"players",user.uid);
      await setDoc(ref,{uid:user.uid,username:profile.username||"Player",avatarColor:profile.avatarColor||"green",active:true,position:{x:player.pos.x,y:player.pos.y,z:player.pos.z},yaw:player.yaw,updatedAt:serverTimestamp()},{merge:true});
      unsubPlayers=onSnapshot(collection(db,"worlds",worldId,"players"),snap=>{
        onlineCount.textContent=snap.size+" online";
        const seen=new Set();
        snap.forEach(d=>{
          if(d.id===user.uid)return;
          const data=d.data(); seen.add(d.id);
          let g=otherPlayers.get(d.id);
          if(!g){g=makePlayerGroup(data.avatarColor||"green",data.username||"Player",false);scene.add(g);otherPlayers.set(d.id,g);}
          if(g.userData.colorName!==(data.avatarColor||"green"))setGroupColor(g,data.avatarColor||"green");
          const p=data.position||{}; g.position.set(Number(p.x||0),Number(p.y||2),Number(p.z||0)); g.rotation.y=Number(data.yaw||0);
        });
        for(const [id,g] of [...otherPlayers])if(!seen.has(id)){scene.remove(g);otherPlayers.delete(id);}
      });
      addEventListener("beforeunload",()=>{try{deleteDoc(ref)}catch(e){}});
    }
    async function pushPresence(elapsed){
      if(!user || elapsed-lastPresence<.18)return; lastPresence=elapsed;
      await setDoc(doc(db,"worlds",worldId,"players",user.uid),{uid:user.uid,username:profile.username||"Player",avatarColor:profile.avatarColor||"green",active:true,position:{x:player.pos.x,y:player.pos.y,z:player.pos.z},yaw:player.yaw,updatedAt:serverTimestamp()},{merge:true}).catch(()=>{});
    }

    // Ephemeral per-game chat
    const chatPanel=document.getElementById("chatPanel"), chatMessages=document.getElementById("chatMessages"), chatForm=document.getElementById("chatForm"), chatInput=document.getElementById("chatInput"), chatStatus=document.getElementById("chatStatus"), chatToggle=document.getElementById("chatToggle");
    async function cleanupOldChat(){
      try{
        const snap=await getDocs(query(collection(db,"worlds",worldId,"liveChat"), orderBy("createdAt","asc"), limit(120)));
        const cutoff=Date.now()-20*60*1000;
        snap.forEach(d=>{const t=d.data().createdAt?.toMillis?.()||Date.now(); if(t<cutoff)deleteDoc(doc(db,"worlds",worldId,"liveChat",d.id)).catch(()=>{});});
      }catch(e){console.warn("chat cleanup failed",e);}
    }
    function startChat(){
      chatStatus.textContent=user?`Chatting as ${profile.username||"Player"}`:"Log in to send messages.";
      chatInput.disabled=!user;
      cleanupOldChat();
      const q=query(collection(db,"worlds",worldId,"liveChat"), orderBy("createdAt","asc"), limit(40));
      unsubChat=onSnapshot(q,snap=>{
        const rows=[]; snap.forEach(d=>rows.push({id:d.id,...d.data()}));
        chatMessages.innerHTML=rows.length?rows.map(m=>`<div class="chatMsg"><span class="chatName">${escapeHtml(m.authorName||"Player")}:</span> ${escapeHtml(m.text||"")}</div>`).join(""):'<div class="chatMsg"><span class="chatName">System:</span> No messages yet.</div>';
        chatMessages.scrollTop=chatMessages.scrollHeight+1000;
      });
    }
    chatForm.addEventListener("submit",async e=>{e.preventDefault(); if(!user)return; const text=chatInput.value.trim().slice(0,160); if(!text)return; chatInput.value=""; await addDoc(collection(db,"worlds",worldId,"liveChat"),{authorId:user.uid,authorName:profile.username||"Player",text,createdAt:serverTimestamp()}); cleanupOldChat();});
    chatInput.addEventListener("focus",()=>document.exitPointerLock?.());
    chatInput.addEventListener("keydown",e=>{if(e.code==="Escape"){chatInput.blur();renderer.domElement.requestPointerLock?.();}});
    chatToggle.onclick=()=>{chatPanel.classList.toggle("collapsed");chatToggle.textContent=chatPanel.classList.contains("collapsed")?"Show":"Hide";};

    const clock=new THREE.Clock();
    function animate(){
      requestAnimationFrame(animate);
      const dt=Math.min(clock.getDelta(),.05);
      updatePlayer(dt);
      pushPresence(clock.elapsedTime);
      for(const [,g] of otherPlayers) if(g.userData.tag) g.userData.tag.position.y=2.55+Math.sin(clock.elapsedTime*1.8+g.position.x*.1)*.04;
      renderer.render(scene,camera);
    }

    async function init(){
      try{
        user=await authReady();
        profile=user?await ensureProfile(user):{username:"Guest",avatarColor:"green"};
        setupControls();
        await loadWorld();
        await startPresence();
        startChat();
        animate();
      }catch(err){
        console.error(err); statusText.textContent=err.message;
      }
    }
    init();
  </script>
</body>
</html>
