
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Oliom Horizons — Play Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root{
      --lime:#7ed957;
      --green:#1f5d19;
      --green-2:#3f922e;
      --muted:#667868;
      --line:#d6efcf;
      --text:#172819;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      height:100vh;
      display:flex;
      flex-direction:column;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:#fff;
      overflow:hidden;
    }
    header{
      min-height:54px;
      padding:8px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.97);
      z-index:3;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
      color:var(--green);
    }
    .brand img{
      width:36px;
      height:36px;
      object-fit:contain;
      border:1px solid var(--line);
      border-radius:12px;
      padding:3px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:7px 13px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--green-2);
      text-decoration:none;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }
    .btn.primary{
      background:var(--lime);
      border-color:var(--lime);
      color:#173019;
    }
    .actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    #gameFrame{
      flex:1;
      width:100%;
      border:0;
      display:none;
      background:#fff;
    }
    #status{
      flex:1;
      display:grid;
      place-items:center;
      padding:24px;
      text-align:center;
      color:var(--muted);
    }
    .card{
      max-width:680px;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      background:#fff;
    }
    .card h1{
      margin-top:0;
      color:var(--green-2);
    }
    .tiny{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }
  
    #chatPanel{
      position:fixed;
      left:12px;
      bottom:12px;
      width:min(420px,calc(100vw - 24px));
      max-height:260px;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:10px;
      border:1px solid rgba(214,239,207,.95);
      border-radius:16px;
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(8px);
      z-index:6;
      box-shadow:0 8px 24px rgba(23,40,25,.08);
    }
    #chatPanel.collapsed #chatMessages,
    #chatPanel.collapsed #chatForm,
    #chatPanel.collapsed #chatStatus{
      display:none;
    }
    #chatHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      font-size:13px;
      font-weight:800;
      color:var(--green);
      cursor:default;
    }
    #chatToggle{
      min-height:26px;
      padding:3px 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--green-2);
      font-weight:800;
      cursor:pointer;
    }
    #chatMessages{
      height:150px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:5px;
      padding-right:4px;
    }
    .chatMsg{
      font-size:13px;
      line-height:1.35;
      color:var(--text);
      word-break:break-word;
    }
    .chatName{
      font-weight:800;
      color:var(--green-2);
    }
    #chatForm{
      display:flex;
      gap:6px;
    }
    #chatInput{
      flex:1;
      min-width:0;
      border-radius:999px;
      border:1px solid var(--line);
      padding:8px 11px;
      outline:none;
      background:#fff;
      color:var(--text);
    }
    #chatSend{
      border:0;
      border-radius:999px;
      padding:8px 12px;
      background:var(--lime);
      color:#173019;
      font-weight:900;
      cursor:pointer;
    }
    #chatStatus{
      font-size:11px;
      color:var(--muted);
    }

  </style>
</head>
<body>
  <header>
    <a href="server.html" class="brand" style="text-decoration:none;">
      <img src="https://res.cloudinary.com/duqlfltkd/image/upload/f_auto,q_auto/Logo_3_1_3_1_hrynwk" alt="Oliom Horizons logo">
      <span>Oliom Horizons · Game</span>
    </a>
    <div class="actions">
      <a href="server.html" class="btn">Back to Games</a>
      <button id="reloadBtn" class="btn primary">Reload Game</button>
    </div>
  </header>

  <div id="status">
    <div class="card">
      <h1>Loading game...</h1>
      <p id="statusText">Preparing the OHS engine.</p>
      <p class="tiny">This page opens the published world in player-only mode.</p>
    </div>
  </div>

  <iframe id="gameFrame" title="Oliom Horizons Game" allow="pointer-lock; fullscreen"></iframe>

  <section id="chatPanel">
    <div id="chatHeader">
      <span>Game Chat</span>
      <button id="chatToggle" type="button">Hide</button>
    </div>
    <div id="chatMessages">
      <div class="chatMsg"><span class="chatName">System:</span> Loading chat...</div>
    </div>
    <form id="chatForm">
      <input id="chatInput" maxlength="160" autocomplete="off" placeholder="Type message..." />
      <button id="chatSend" type="submit">Send</button>
    </form>
    <div id="chatStatus">Temporary per-game chat.</div>
  </section>


  <script>
    const params = new URLSearchParams(location.search);
    const worldId = params.get("world");
    const statusBox = document.getElementById("status");
    const statusText = document.getElementById("statusText");
    const frame = document.getElementById("gameFrame");
    const reloadBtn = document.getElementById("reloadBtn");

    function loadGame(){
      if(!worldId){
        statusText.textContent = "No world id was provided. Open a game from the Games page.";
        reloadBtn.disabled = true;
        return;
      }

      const src = "studio.html?world=" + encodeURIComponent(worldId) + "&play=1&fromGame=1&v=24";
      statusBox.style.display = "grid";
      frame.style.display = "none";
      frame.src = src;

      frame.onload = () => {
        statusBox.style.display = "none";
        frame.style.display = "block";
      };

      setTimeout(() => {
        if(frame.style.display !== "block"){
          statusText.textContent = "Still loading. If it stays here, open DevTools Console and check for a Firebase or script error.";
        }
      }, 4500);
    }

    reloadBtn.addEventListener("click", () => {
      frame.src = "about:blank";
      setTimeout(loadGame, 100);
    });

    loadGame();
  </script>

  <script type="module">
    import {
      authReady,
      ensureProfile,
      db,
      escapeHtml,
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc,
      query,
      orderBy,
      limit,
      onSnapshot,
      serverTimestamp
    } from "./firebase-core.js";

    const chatPanel = document.getElementById("chatPanel");
    const chatMessages = document.getElementById("chatMessages");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const chatStatus = document.getElementById("chatStatus");
    const chatToggle = document.getElementById("chatToggle");

    const chatParams = new URLSearchParams(location.search);
    const chatWorldId = chatParams.get("world");
    let chatUser = null;
    let chatProfile = null;

    function renderChatMessage(m){
      const name = escapeHtml(m.authorName || "Player");
      const text = escapeHtml(m.text || "");
      return `<div class="chatMsg"><span class="chatName">${name}:</span> ${text}</div>`;
    }

    function scrollChatBottom(){
      chatMessages.scrollTop = chatMessages.scrollHeight + 1000;
    }


    async function cleanupOldChat(){
      if(!chatWorldId || !chatUser) return;
      try{
        const oldQ = query(collection(db, "worlds", chatWorldId, "liveChat"), orderBy("createdAt", "asc"), limit(120));
        const snap = await getDocs(oldQ);
        const cutoff = Date.now() - 20 * 60 * 1000;
        snap.forEach(d => {
          const ms = d.data().createdAt?.toMillis?.() || Date.now();
          if(ms < cutoff){
            deleteDoc(doc(db, "worlds", chatWorldId, "liveChat", d.id)).catch(()=>{});
          }
        });
      }catch(err){
        console.warn("Old chat cleanup failed:", err);
      }
    }

    async function initChat(){
      if(!chatWorldId){
        chatStatus.textContent = "Open a game from Games to use chat.";
        chatInput.disabled = true;
        return;
      }

      chatUser = await authReady();
      if(!chatUser){
        chatStatus.textContent = "Log in to send messages. You can still read recent messages.";
        chatInput.disabled = true;
      }else{
        chatProfile = await ensureProfile(chatUser);
        chatStatus.textContent = `Chatting as ${chatProfile.username || "Player"}`;
        chatInput.disabled = false;
        cleanupOldChat();
      }

      const chatRef = collection(db, "worlds", chatWorldId, "liveChat");
      const q = query(chatRef, orderBy("createdAt", "asc"), limit(40));

      onSnapshot(q, snap => {
        const rows = [];
        snap.forEach(d => rows.push({ id:d.id, ...d.data() }));
        chatMessages.innerHTML = rows.length
          ? rows.map(renderChatMessage).join("")
          : '<div class="chatMsg"><span class="chatName">System:</span> No messages yet.</div>';
        scrollChatBottom();
      }, err => {
        console.error("Chat failed:", err);
        chatMessages.innerHTML = `<div class="chatMsg"><span class="chatName">System:</span> Chat error: ${escapeHtml(err.message)}</div>`;
      });
    }

    chatForm.addEventListener("submit", async e => {
      e.preventDefault();
      if(!chatWorldId || !chatUser || !chatProfile) return;
      const text = chatInput.value.trim().slice(0,160);
      if(!text) return;
      chatInput.value = "";
      try{
        await addDoc(collection(db, "worlds", chatWorldId, "liveChat"), {
          authorId: chatUser.uid,
          authorName: chatProfile.username || "Player",
          text,
          createdAt: serverTimestamp()
        });
        cleanupOldChat();
      }catch(err){
        console.error("Send chat failed:", err);
        chatStatus.textContent = "Chat send failed: " + err.message;
      }
    });

    chatInput.addEventListener("focus", () => {
      document.exitPointerLock?.();
    });

    chatToggle.addEventListener("click", () => {
      chatPanel.classList.toggle("collapsed");
      chatToggle.textContent = chatPanel.classList.contains("collapsed") ? "Show" : "Hide";
    });

    await initChat();
  </script>

</body>
</html>
